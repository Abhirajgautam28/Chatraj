## Normalized by assistant to ensure valid workflow_dispatch handling
name: Set Vercel deploy environment variable

on:
  workflow_dispatch:
    inputs:
      vercel_project_id:
        description: 'Vercel project id (proj_...)'
        required: true
      target:
        description: 'Vercel target environment (production|preview|development)'
        required: false
        default: 'production'

jobs:
  set-vercel-env:
    runs-on: ubuntu-latest
    permissions: contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set Vercel env var
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ github.event.inputs.vercel_project_id }}
          ENV_KEY: CSRF_SIGNING_SECRET
          ENV_VALUE: ${{ secrets.CSRF_SIGNING_SECRET }}
          VERCEL_TARGET: ${{ github.event.inputs.target }}
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "VERCEL_TOKEN secret is missing. Add it to repository secrets as VERCEL_TOKEN.";
            exit 1;
          fi
          if [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "vercel_project_id input is required. Provide it when dispatching the workflow.";
            exit 1;
          fi
          node .github/scripts/set_vercel_env.js
