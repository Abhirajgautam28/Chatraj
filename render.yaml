services:
  - type: web
    name: chatraj-backend
    env: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CSRF_SIGNING_SECRET
        # DO NOT set a real secret in source; set this in Render / platform dashboard.
        value: "<SET_IN_PLATFORM_DASHBOARD>"
    healthCheckPath: /health